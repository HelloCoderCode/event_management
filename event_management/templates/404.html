{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<section style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:64px 20px;">
  <div style="max-width:720px;text-align:center;">
    <div style="font-family:var(--serif);font-size:72px;line-height:1;color:var(--accent);margin-bottom:12px;">
      404
    </div>
    <h1 style="font-size:28px;line-height:1.3;margin-bottom:10px;">This page is off the map</h1>
    <p style="color:var(--t2);font-size:16px;line-height:1.6;margin-bottom:22px;">
      The link you followed does not exist or was moved. Try heading back to the homepage to discover live events.
    </p>
    <a href="/" style="display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;padding:12px 18px;border-radius:999px;font-weight:600;">
      Back to Home
    </a>
  </div>
</section>
{% endblock %}
