{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<section style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:64px 20px;">
  <div style="max-width:720px;text-align:center;">
    <div style="font-family:var(--serif);font-size:72px;line-height:1;color:var(--danger);margin-bottom:12px;">
      500
    </div>
    <h1 style="font-size:28px;line-height:1.3;margin-bottom:10px;">Something went wrong</h1>
    <p style="color:var(--t2);font-size:16px;line-height:1.6;margin-bottom:22px;">
      Our server hit an unexpected error. Please refresh or return to the homepage in a moment.
    </p>
    <a href="/" style="display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;padding:12px 18px;border-radius:999px;font-weight:600;">
      Back to Home
    </a>
  </div>
</section>
{% endblock %}
